run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  goimports:
    local-prefixes: github.com/ischademadda/CRDT-Engine

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
